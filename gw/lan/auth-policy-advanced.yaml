apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: lan-auth-advanced
  namespace: rhcl-demo-lab
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: rhcl-demo-lab
    namespace: rhcl-demo-lab
  rules:
    matches:
      - path:
          type: PathPrefix
          value: /
    authentication:
      keycloak-jwt:
        jwt:
          issuerUrl: https://auth.arencloud.com:30238/realms/rhcl-demo
          #jwksUrl: https://auth.arencloud.com:30238/realms/rhcl-demo/protocol/openid-connect/certs
        audiences:
          - rhcl-microservices
    metadata: # <--- New Section to capture the request body
      request-body:
        http:
          request:
            method: POST # Only capture for POST requests
            body:
              json: {} # Instructs Authorino to parse the body as JSON and inject it
    authorization:
      opa-role-checks:
        opa:
          rego: |
            package kuadrant.authz
            # Extract fields safely
            roles := input.auth.identity.realm_access.roles
            path := input.context.request.http.path
            method := to_upper(input.context.request.http.method)
            headers := input.context.request.http.headers
            query := input.context.request.http.query
            
            # Safe tenant extraction
            tenant := query.tenant[_]
            
            # Safe body reference (only present if body capture enabled)
            body := input.metadata.request_body
            
            # Header check (must exist, or rule fails cleanly)
            required_header {
              headers["x-env"]
              to_lower(headers["x-env"][0]) == "lan"
            }

            # Tenant must exist and equal "demo"
            required_tenant {
              tenant == "demo"
            }
            
            # Final allow rule (single rule required by Authorino)
            allow {

              required_header
              required_tenant

              (
                # ------------------------------
                # Inventory rules
                # ------------------------------
                startswith(path, "/api/v1/items") &&
                (
                  (method == "GET"  && roles[_] == "inventory.reader") ||
                  (method != "GET" && roles[_] == "inventory.writer")
                )
              )

              ||

              (
                # ------------------------------
                # Order rules
                # ------------------------------
                startswith(path, "/api/v1/orders") &&
                (
                  (method == "GET"  && roles[_] == "orders.reader") ||
                  (
                    method != "GET" &&
                    roles[_] == "orders.writer" &&
                    body.tenant == "demo"
                  )
                )
              )
            }