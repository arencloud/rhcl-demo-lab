apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: lan-auth-advanced
  namespace: rhcl-demo-lab
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: rhcl-demo-lab
    namespace: rhcl-demo-lab
  rules:
    matches:
      - path:
          type: PathPrefix
          value: /
    authentication:
      keycloak-jwt:
        jwt:
          issuerUrl: https://auth.arencloud.com:30238/realms/rhcl-demo
          #jwksUrl: https://auth.arencloud.com:30238/realms/rhcl-demo/protocol/openid-connect/certs
        audiences:
          - rhcl-microservices
    metadata: # <--- New Section to capture the request body
      request-body:
        http:
          request:
            method: POST # Only capture for POST requests
            body:
              json: {} # Instructs Authorino to parse the body as JSON and inject it
    authorization:
      opa-role-checks:
        opa:
          rego: |
            package kuadrant.authz
            default allow = false
            roles := input.auth.identity.realm_access.roles
            path := input.context.request.http.path
            method := upper(input.context.request.http.method)
            headers := input.context.request.http.headers
            tenant := input.context.request.http.query["tenant"][0]
            # Reference the captured body from the metadata section
            body := input.metadata.request_body
            
            required_header {
              lower(headers["x-env"][0]) == "lan"
            }
            required_tenant {
              tenant == "demo"
            }
            # Rule for inventory GET (Read)
            allow {
              required_header
              required_tenant
              startswith(path, "/api/v1/items")
              method == "GET"
              roles[_] == "inventory.reader"
            }
            # Rule for inventory non-GET (Write)
            allow {
              required_header
              required_tenant
              startswith(path, "/api/v1/items")
              method != "GET"
              roles[_] == "inventory.writer"
            }
            # Rule for orders GET (Read)
            allow {
              required_header
              required_tenant
              startswith(path, "/api/v1/orders")
              method == "GET"
              roles[_] == "orders.reader"
            }
            # Rule for orders non-GET (Write) with body check
            allow {
              required_header
              required_tenant
              startswith(path, "/api/v1/orders")
              method != "GET"
              roles[_] == "orders.writer"
              body.tenant == "demo"
            }